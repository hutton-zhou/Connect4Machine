<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Connect 4</title>
        <link rel="stylesheet" href="style.css">
        <script src="main.js" defer></script>
    </head>
    <body>
        <canvas width="700" height="600" id="game"></canvas>
        <div id="sidebar">
            <h1>Menu</h1>
            <button id="pvp" onclick="runWithProtection({1:false, 2:false})">Player vs Player</button>
            <button id="pvai" onclick="runWithProtection({1:false,2:true})">Player vs AI</button>

            <p id="current">Current Game: Player vs Player</p>
            <p id="turn">Red Player Turn</p>
            <label for="slider" id="labelIQ">AI Intelligence: 12</label>
            <input type="range" id="aiIQ" min="1" max="12" value="12" name="slider" disabled>
            <p id="aiSays">AI Says: </p>
        </div>
    </body>

</html>
